<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Einarbeitung · Anästhesiepflege · Heliosklinik Kiel</title>
<style>
  :root {
    --teal: #005A6E;
    --teal-med: #0E7490;
    --teal-light: #CFFAFE;
    --teal-bg: #F0FDFF;
    --red: #C0392B;
    --red-bg: #FDEDEC;
    --amber: #B45309;
    --amber-bg: #FFFBEB;
    --green: #15803D;
    --green-bg: #F0FDF4;
    --blue: #1D4ED8;
    --blue-bg: #EFF6FF;
    --purple: #6D28D9;
    --purple-bg: #F5F3FF;
    --grey: #374151;
    --grey-bg: #F9FAFB;
    --border: #E5E7EB;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F3F4F6; color: var(--grey); min-height: 100vh; }

  /* Header */
  #header {
    background: var(--teal);
    color: white;
    padding: 0 16px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #header-left { display: flex; align-items: center; gap: 10px; }
  #header-title { font-size: 14px; font-weight: 700; line-height: 1; }
  #header-sub { font-size: 10px; opacity: 0.8; margin-top: 2px; }
  #header-right { display: flex; align-items: center; gap: 8px; }
  #check-badge {
    font-size: 11px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 3px 10px;
  }
  #menu-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
  }

  /* Drawer */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
  }
  #overlay.open { display: block; }
  #drawer {
    position: fixed;
    top: 0; left: 0; bottom: 0;
    width: 260px;
    background: white;
    z-index: 300;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    overflow-y: auto;
  }
  #drawer.open { transform: translateX(0); }
  #drawer-header {
    background: var(--teal);
    color: white;
    padding: 16px;
    font-weight: 700;
    font-size: 14px;
  }
  .drawer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    border-bottom: 1px solid var(--border);
    transition: all 0.15s;
    background: none;
    width: 100%;
    text-align: left;
  }
  .drawer-item:hover { background: var(--teal-bg); }
  .drawer-item.active { background: var(--teal-light); border-left-color: var(--teal); }
  .drawer-item .di-icon { font-size: 18px; }
  .drawer-item .di-title { font-size: 13px; font-weight: 600; color: var(--grey); }
  .drawer-item.active .di-title { color: var(--teal); }
  .drawer-item .di-sub { font-size: 10px; color: #9CA3AF; margin-top: 1px; }

  /* Main */
  #main { padding: 12px; max-width: 700px; margin: 0 auto; }

  /* Chapter header */
  .ch-header {
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: white;
  }
  .ch-header .ch-icon { font-size: 28px; }
  .ch-header .ch-title { font-size: 18px; font-weight: 700; }
  .ch-header .ch-sub { font-size: 12px; opacity: 0.85; margin-top: 2px; }

  /* Pills */
  #pills {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .pill {
    border-radius: 20px;
    padding: 5px 11px;
    font-size: 11px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: white;
    color: var(--grey);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill.active { color: white; font-weight: 700; }

  /* Content card */
  #content-card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 14px;
  }

  /* Section heading */
  .sec-heading {
    font-size: 15px;
    font-weight: 700;
    color: var(--teal);
    border-bottom: 2px solid var(--teal-light);
    padding-bottom: 6px;
    margin: 20px 0 10px;
  }
  .sec-heading:first-child { margin-top: 0; }

  /* CAVE */
  .cave {
    background: var(--red-bg);
    border: 1px solid #FECACA;
    border-left: 4px solid var(--red);
    border-radius: 0 8px 8px 0;
    padding: 11px 14px;
    margin: 10px 0;
    font-size: 13px;
    line-height: 1.55;
    color: #7F1D1D;
  }
  .cave strong { color: var(--red); }

  /* Highlight */
  .highlight {
    background: var(--blue-bg);
    border: 1px solid #BFDBFE;
    border-left: 4px solid var(--blue);
    border-radius: 0 8px 8px 0;
    padding: 11px 14px;
    margin: 10px 0;
    font-size: 13px;
    line-height: 1.55;
    color: #1E3A8A;
  }
  .highlight strong { font-weight: 700; display: block; margin-bottom: 4px; }

  /* Info box */
  .infobox {
    background: var(--teal-bg);
    border: 1px solid #A5F3FC;
    border-radius: 8px;
    padding: 12px 14px;
    margin: 10px 0;
  }
  .infobox-title { color: var(--teal); font-weight: 700; font-size: 13px; margin-bottom: 7px; }
  .infobox ul { padding-left: 18px; }
  .infobox li { color: #164E63; font-size: 13px; line-height: 1.65; margin-bottom: 2px; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 10px 0; }
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 13px;
    border-top-width: 3px;
  }
  .card .c-icon { font-size: 20px; margin-bottom: 6px; }
  .card .c-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .card .c-text { font-size: 12px; color: #4B5563; line-height: 1.5; }

  /* Table */
  .tbl-wrap { overflow-x: auto; margin: 10px 0; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--teal);
    color: white;
    padding: 8px 10px;
    text-align: left;
    font-weight: 700;
    white-space: nowrap;
  }
  tbody tr:nth-child(even) { background: var(--grey-bg); }
  tbody td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.4; }
  tbody td:first-child { font-weight: 600; color: var(--teal); white-space: nowrap; }
  .phone-badge {
    display: inline-block;
    background: var(--teal);
    color: white;
    border-radius: 4px;
    padding: 2px 8px;
    font-weight: 700;
    font-size: 13px;
    font-family: monospace;
  }

  /* List */
  .content-list { padding-left: 20px; margin: 8px 0; }
  .content-list li { font-size: 13px; line-height: 1.7; margin-bottom: 2px; color: var(--grey); }

  /* Checklist */
  .cl-group {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .cl-group.done { border-color: #86EFAC; }
  .cl-group-header {
    background: var(--grey-bg);
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cl-group.done .cl-group-header { background: var(--green-bg); }
  .cl-group-title { font-weight: 700; font-size: 13px; }
  .cl-group.done .cl-group-title { color: var(--green); }
  .cl-progress {
    font-size: 11px;
    font-weight: 600;
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 8px;
  }
  .cl-group.done .cl-progress { background: #DCFCE7; color: var(--green); border-color: #86EFAC; }
  .cl-items { padding: 6px 14px; }
  .cl-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 4px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cl-item:last-child { border-bottom: none; }
  .cl-box {
    width: 20px; height: 20px;
    border-radius: 4px;
    border: 2px solid #D1D5DB;
    background: white;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 12px;
    font-weight: 900;
    color: white;
  }
  .cl-item.checked .cl-box { background: var(--green); border-color: var(--green); }
  .cl-label { font-size: 13px; line-height: 1.5; transition: all 0.2s; }
  .cl-item.checked .cl-label { color: #9CA3AF; text-decoration: line-through; }

  /* Sign */
  .sign-block {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 18px;
    padding: 14px;
    background: var(--grey-bg);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .sign-role { font-size: 12px; color: #6B7280; margin-bottom: 8px; font-weight: 600; }
  .sign-line { border-bottom: 1px solid #9CA3AF; height: 28px; margin-bottom: 5px; }
  .sign-hint { font-size: 10px; color: #9CA3AF; }

  /* Nav footer */
  #nav-footer { display: flex; gap: 8px; margin-bottom: 20px; }
  .nav-btn {
    flex: 1;
    padding: 11px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 12px;
    color: var(--grey);
    font-weight: 600;
    transition: all 0.15s;
    text-align: center;
  }
  .nav-btn.next { border-color: var(--teal); background: var(--teal); color: white; }
  .nav-btn:active { opacity: 0.8; }

  /* Progress bar */
  #progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.2);
    position: relative;
  }
  #progress-fill {
    height: 100%;
    background: #67E8F9;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<div id="header">
  <div id="header-left">
    <span style="font-size:20px">🏥</span>
    <div>
      <div id="header-title">Heliosklinik Kiel</div>
      <div id="header-sub">Einarbeitung · Anästhesiepflege (Erfahren)</div>
    </div>
  </div>
  <div id="header-right">
    <div id="check-badge">✅ <span id="check-count">0</span>/<span id="check-total">0</span></div>
    <button id="menu-btn" onclick="toggleDrawer()">☰</button>
  </div>
</div>
<div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>

<div id="overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div id="drawer-header">🏥 Kapitelübersicht</div>
  <div id="drawer-items"></div>
</div>

<div id="main">
  <div class="ch-header" id="ch-header">
    <span class="ch-icon" id="ch-icon"></span>
    <div>
      <div class="ch-title" id="ch-title"></div>
      <div class="ch-sub" id="ch-sub"></div>
    </div>
  </div>
  <div id="pills"></div>
  <div id="content-card"></div>
  <div id="nav-footer"></div>
</div>

<script>
const chapters = [
  { id:"struktur",   icon:"🏥", title:"Hausstruktur",        sub:"OP-Einheiten & Räume",          color:"#005A6E" },
  { id:"zeiten",     icon:"🕐", title:"Dienstzeiten",         sub:"Dienste & Rufbereitschaft",      color:"#1D4ED8" },
  { id:"morgen",     icon:"☀️", title:"Arbeitsbeginn",        sub:"Morgens bis OP-Start",           color:"#B45309" },
  { id:"patienten",  icon:"🛏️", title:"Patientenaufnahme",    sub:"Ambulant & stationär",           color:"#0E7490" },
  { id:"monitoring", icon:"📡", title:"Monitoring",           sub:"Geräte & Systeme",               color:"#15803D" },
  { id:"narkose",    icon:"💊", title:"Narkosevorbereitung",  sub:"Materialien & Medikamente",      color:"#6D28D9" },
  { id:"regional",   icon:"💉", title:"Regionalanästhesie",   sub:"Blockaden & Sonographie",        color:"#0E7490" },
  { id:"spinal",     icon:"🦴", title:"Spinalanästhesie",     sub:"Rückenmarknarkose",              color:"#0F766E" },
  { id:"zvk",        icon:"🩺", title:"ZVK",                  sub:"Zentralvenöser Katheter",        color:"#6D28D9" },
  { id:"lagerung",   icon:"🛏️", title:"Lagerung",             sub:"Positionen & Blutsperre",        color:"#0369A1" },
  { id:"awr",        icon:"🛌", title:"Aufwachraum",          sub:"Betreuung & Übergabe",           color:"#1D4ED8" },
  { id:"notfall",    icon:"🚨", title:"Notfall & Reanimation",sub:"Notfallbox & Defi",              color:"#C0392B" },
  { id:"telefon",    icon:"📞", title:"Telefonnummern",       sub:"Alle Durchwahlnummern",          color:"#374151" },
  { id:"awrdienst",   icon:"🌅", title:"AWR-Dienst",        sub:"Morgens & Nachmittag",            color:"#0369A1" },
  { id:"checkliste", icon:"✅", title:"Einarbeitungs-Check",  sub:"Fortschritt dokumentieren",      color:"#15803D" },
];

const content = {
  struktur: [
    {t:"sec", text:"Erdgeschoss – Großraum OP"},
    {t:"cards", items:[
      {icon:"🔵", color:"#005A6E", title:"Saal 1 & 2 + Einleitung 1 & 2", text:"Philips-Monitor-System. Der komplette Monitor wandert mit dem Patienten von Einleitung → Saal → AWR. Kein Umklemmen nötig."},
      {icon:"🟡", color:"#B45309", title:"Saal 3 & 4 + Einleitung 3", text:"Ältere Trägersysteme. Patient muss bei Saaltransfer umgeklemmt werden: SpO₂, Blutdruck, EKG neu anschließen."},
      {icon:"⚠️", color:"#C0392B", title:"Doppelbelegung Einleitung 3", text:"Saal 3 UND Saal 4 teilen eine Einleitung. Morgens Absprache, wer zuerst einleitet. Ausweichen möglich auf Einleitung 1 (Backup-Monitor steht dort)."},
    ]},
    {t:"cave", text:"Wenn Saal 3 und Saal 4 morgens beide ein Regionalverfahren brauchen: erst Narkose in der Einleitung, dann Regionalblock im Saal – dabei quer vor den OP-Bereich stellen."},
    {t:"sec", text:"1. Obergeschoss"},
    {t:"list", items:[
      "Urologisches Röntgen (Tel. 362) – Urologen-Bereich, eigenes Monitoring",
      "Kleiner Eingriffsraum (Tel. 363) – Einleitung direkt im Saal, kein eigener Einleitungsraum",
      "Patienten werden oben im AWR vorbereitet, gehen selbstständig zum OP, Rückkehr per Rollbrett",
      "Bei geplantem ambulantem Programm: Anästhesieteam aus Wellingdorf übernimmt",
      "Für alle anderen: Patienten werden unten vorbereitet und nach oben gefahren",
    ]},
    {t:"sec", text:"Aufwachraum (AWR)"},
    {t:"table", headers:["Sektor","Betten","Besonderheit"], rows:[
      ["Stationär","5–6 Plätze","Vollständige Monitorüberwachung, Verlegung nach Standard"],
      ["Ambulant","4 Betten","Patienten dürfen essen/trinken, Entlassung nach ärztlicher Visite"],
    ]},
    {t:"info", title:"Geräte im AWR", items:[
      "Eines der zwei Sonographiegeräte steht immer im AWR",
      "Defibrillator vorhanden",
      "Notfallwagen vorhanden",
      "Opiatschlüssel AWR: immer im AWR, am Dienstende nach oben geben",
    ]},
  ],

  zeiten: [
    {t:"sec", text:"Reguläre Dienstzeiten"},
    {t:"table", headers:["Tag","Dienstzeit","Bemerkung"], rows:[
      ["Mo – Do","07:00 – 15:30 Uhr","Pünktlich 7:00 Uhr im Saal. Wege-/Rüstzeit (15:20) komplett am Ende nehmen."],
      ["Freitag","07:00 – 14:00 Uhr",""],
      ["8-Uhr-Dienst Mo–Do","08:00 – 16:30 Uhr","Macht AWR zu Ende"],
      ["8-Uhr-Dienst Fr","08:00 – 15:00 Uhr","Gleiches Prinzip: darf gehen wenn nur noch ein Saal läuft + AWR leer, ODER nur noch AWR belegt ist"],
    ]},
    {t:"info", title:"Regelung 8-Uhr-Dienst", items:[
      "Darf nach Hause wenn: nur noch 1 Saal läuft UND AWR leer ist – ODER kein Saal mehr läuft und nur noch AWR belegt ist (→ AWR fertig machen, dann gehen)",
      "Gilt Mo–Do und Fr gleichermaßen – kein festes Dienstende solange noch Saal UND AWR gleichzeitig laufen",
    ]},
    {t:"sec", text:"Rufbereitschaft"},
    {t:"cards", items:[
      {icon:"📱", color:"#1D4ED8", title:"Erreichbarkeit", text:"Von zu Hause – ausschließlich erreichbar über Rufumleitung Tel. 335."},
      {icon:"🌙", color:"#005A6E", title:"Wochentags", text:"Von Dienstende bis nächsten Morgen 7:00 Uhr (Einzeldienst)."},
      {icon:"📅", color:"#6D28D9", title:"Freitag bis Montag", text:"Freitag 14:00 Uhr bis Montag 7:00 Uhr durchgehend."},
    ]},
    
    {t:"sec", text:"Dienstende – Übergabe-Ablauf 8-Uhr-Dienst"},
    {t:"list", items:[
      "Letzten Patienten im AWR verlegen",
      "Beide BtM-Schlüssel (EG + AWR) auf Station 2 bringen",
      "Rufumleitung auf Tel. 335 einrichten",
      "Kontrollanruf beim Rufdienst-Kollegen: alle Patienten verlegt? Rufumleitung funktioniert?",
      "Erst dann: Feierabend",
    ]},
    {t:"cave", text:"Der Kontrollanruf ist Pflicht – nicht optional! Er bestätigt gleichzeitig zwei Dinge: alle Patienten sind sicher verlegt, und der Rufdienst ist erreichbar. Wenn der Anruf nicht durchgeht: Rufumleitung prüfen und neu einrichten."},
    {t:"sec", text:"Freie Zeiten & Urlaub"},
    {t:"list", items:[
      "Wochenenden: grundsätzlich frei",
      "Feiertage: jede/r übernimmt einen Feiertag (Ostern, Himmelfahrt etc.)",
      "Zwischen Weihnachten und Neujahr: Klinik geschlossen → ca. 3–4 Urlaubstage einplanen",
    ]},
    {t:"sec", text:"Pausen"},
    {t:"info", title:"Pausenregelung", items:[
      "Säle: Jeder Saal regelt seine Pausen eigenständig",
      "AWR darf NIEMALS unbesetzt sein! Pause nur wenn eine Vertretung den AWR für 30 Minuten vollständig übernimmt",
    ]},
    {t:"cave", text:"Im AWR niemals alleine pausieren. Immer Rücksprache mit TL (Tel. 381) – Abdeckung muss sichergestellt sein."},
  ],

  morgen: [
    {t:"sec", text:"Morgendliche Geräteüberprüfung (ab 07:00 Uhr)"},
    {t:"list", items:[
      "Narkosegerät: Lecktest und Einsatzfähigkeit prüfen",
      "Absaugung: Funktion kontrollieren – danach wieder ausschalten (nicht dauerhaft laufen lassen wegen Lärm)",
      "Narkoseabgasführung: wieder einstecken!",
      "Kühlschrank: Atropin und Atracurium holen, auf alle Einleitungen verteilen",
      "Bestimmung: wer welchen Saal / welche Einleitung macht",
    ]},
    {t:"cave", text:"Die Abgasleitung des Narkosegeräts muss jeden Morgen eingesteckt sein – wird sie vergessen, gelangt Sevofluran in die Raumluft (Gesundheitsrisiko für alle im Saal)."},
    {t:"sec", text:"Ambulante Patientenaufnahme (ab 06:45 Uhr)"},
    {t:"highlight", title:"Maike fängt 15 Minuten früher an – 06:45 Uhr", text:"Die ambulanten Patienten werden bereits vor dem regulären Dienstbeginn im AWR aufgenommen und vorbereitet."},
    {t:"list", items:[
      "Patienten in den AWR (ambulanter Sektor) holen",
      "Abfragen: Nüchternheit, Abholung organisiert, Kleber/Allergien, Gehhilfen, Frühstück dabei?",
      "Patient zieht sich um → Netzschlüpfer",
      "Patient ins zugewiesene Bett setzen",
      "Kläppchen (Identifikationsschild) ans Bett",
      "Armband zur Patientenidentifikation anlegen",
      "Seite markieren und ggf. rasieren",
      "Einschleusereihenfolge mit Servicepersonal der Schleuse absprechen (lt. morgendlichem Programm)",
    ]},
    {t:"cave", text:"Hier ist es ausdrücklich erwünscht, Kolleginnen in der Einleitung zu helfen – Patienten mitvor­bereiten oder bei der Ausleitung im Saal helfen. Das ist kein Eingriff in fremde Aufgaben, sondern ein Muss für reibungslose Übergänge. Anders als in anderen Häusern!"},
  ],

  patienten: [
    {t:"sec", text:"Patientenanamnese in der Einleitung"},
    {t:"list", items:[
      "Name und Geburtsdatum (Identitätskontrolle!)",
      "Nüchternheit heute: gegessen? getrunken?",
      "Morgenmedikation: eingenommen? Wenn ja – welche?",
      "Allergien: Medikamente, Latex, Pflaster etc.",
      "Zahnprothesen? → raus!",
      "Welcher Eingriff? An welcher Seite?",
      "Seitenmarkierung vorhanden und korrekt?",
      "Narkoseverfahren mit dem Anästhesisten besprechen",
    ]},
    {t:"sec", text:"Monitoring anlegen"},
    {t:"list", items:[
      "EKG-Elektroden (3- oder 5-Ableitung je nach Saal)",
      "SpO₂-Clip (Pulsoximeter)",
      "Blutdruckmanschette (NIBP)",
      "Venöser Zugang: mindestens 20 G, besser 18 G",
      "Infusion mit Dreiwegehahn anschließen",
    ]},
    {t:"sec", text:"Narkoseeinleitung"},
    {t:"list", items:[

    {t:"sec", text:"Alarm Fatigue – Alarmmüdigkeit"},
    {t:"cave", text:"Das Philips-System schlägt in der Einleitung sehr häufig roten Alarm wegen Atemfrequenz und etCO₂ – solange der Patient noch nicht beatmet wird (z.B. beim Anschließen, Vorbereitung, spontan atmend). Das ist technisch bedingt und kein echter Notfall. ABER: Diese Daueralarmierung führt zu Alarmmüdigkeit (Alarm Fatigue)! Das bedeutet: das Gehirn blendet den roten Alarm automatisch aus – auch dann, wenn es ein ECHTER Alarm ist. SpO₂-Abfall, Blutdruckabfall, Asystolie können so übersehen werden. Niemals einen roten Alarm ungeprüft ignorieren – immer kurz hinschauen und bewusst einschätzen: falscher Alarm oder echter Notfall?"},

      "Atemfrequenz- und etCO₂-Alarm in der Einleitung: Ursache kennen (Patient noch nicht beatmet) – aber trotzdem kurz prüfen",
      "Alarm nie einfach wegdrücken ohne hinzuschauen",
      "Bei jedem roten Alarm: 2 Sekunden bewusst auf den Monitor schauen – SpO₂? RR? HF? etCO₂?",
      "Echte Alarme erkennen: SpO₂-Kurve weg, RR-Abfall, flache Linie im EKG = sofort handeln",
      "Im Team ansprechen wenn Alarmmüdigkeit auffällt – das ist kein Versagen, sondern ein bekanntes Patientensicherheitsproblem",

    {t:"sec", text:"Wann und warum Spinalanästhesie?"},
    {t:"highlight", title:"Seltenes Verfahren bei uns", text:"Die Spinalanästhesie wird bei uns nur in ausgewählten Fällen eingesetzt – z.B. bei Eingriffen an Blase, Prostata, Leiste, Perineum oder unteren Extremitäten, wo eine Vollnarkose vermieden werden soll."},

    {t:"cave", text:"Isobar vs. hyperbar ist klinisch entscheidend! Isobar verteilt sich gleichmäßig, hyperbar sinkt durch die Schwerkraft nach unten. Ampress (hyperbar) für ambulant: kürzere, gezieltere Wirkung. Immer mit dem Anästhesisten absprechen – und nie verwechseln!"},

// ── State ────────────────────────────────────────────────────────
let active = "struktur";
let checked = JSON.parse(localStorage.getItem("hk_checks") || "{}");

function saveChecks() {
  localStorage.setItem("hk_checks", JSON.stringify(checked));
}

// ── Count total checkboxes ───────────────────────────────────────
function countTotals() {
  let total = 0;
  Object.values(content).forEach(blocks => {
    blocks.forEach(b => { if(b.t === "cl_group") total += b.items.length; });
  });
  return total;
}

function countChecked() {
  return Object.values(checked).filter(Boolean).length;
}

function updateBadge() {
  const total = countTotals();
  const done = countChecked();
  document.getElementById("check-count").textContent = done;
  document.getElementById("check-total").textContent = total;
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
}

// ── Render ───────────────────────────────────────────────────────
function renderContent() {
  const ch = chapters.find(c => c.id === active);
  document.getElementById("ch-icon").textContent = ch.icon;
  document.getElementById("ch-title").textContent = ch.title;
  document.getElementById("ch-sub").textContent = ch.sub;
  document.getElementById("ch-header").style.background = ch.color;

  // pills
  const pillsEl = document.getElementById("pills");
  pillsEl.innerHTML = chapters.map(c => `
    <button class="pill ${c.id === active ? "active" : ""}"
      style="${c.id === active ? "background:"+c.color+";border-color:"+c.color : ""}"
      onclick="navigate('${c.id}')">${c.icon} ${c.title}</button>
  `).join("");

  // drawer items
  document.getElementById("drawer-items").innerHTML = chapters.map(c => `
    <button class="drawer-item ${c.id === active ? "active" : ""}" onclick="navigate('${c.id}')">
      <span class="di-icon">${c.icon}</span>
      <div>
        <div class="di-title">${c.title}</div>
        <div class="di-sub">${c.sub}</div>
      </div>
    </button>
  `).join("");

  // content
  const blocks = content[active] || [];
  let clGroupIdx = 0;
  document.getElementById("content-card").innerHTML = blocks.map(b => renderBlock(b, clGroupIdx++)).join("");

  // attach checklist listeners
  document.querySelectorAll(".cl-item").forEach(el => {
    el.addEventListener("click", () => {
      const key = el.dataset.key;
      checked[key] = !checked[key];
      el.classList.toggle("checked", checked[key]);
      el.querySelector(".cl-box").textContent = checked[key] ? "✓" : "";
      saveChecks();
      updateBadge();
      updateGroupProgress(el.closest(".cl-group"));
    });
  });

  // nav footer
  const idx = chapters.findIndex(c => c.id === active);
  const prev = chapters[idx - 1];
  const next = chapters[idx + 1];
  document.getElementById("nav-footer").innerHTML = `
    ${prev ? `<button class="nav-btn" onclick="navigate('${prev.id}')">← ${prev.icon} ${prev.title}</button>` : "<div style='flex:1'></div>"}
    ${next ? `<button class="nav-btn next" onclick="navigate('${next.id}')">${next.icon} ${next.title} →</button>` : "<div style='flex:1'></div>"}
  `;

  updateBadge();
}

function updateGroupProgress(groupEl) {
  if (!groupEl) return;
  const items = groupEl.querySelectorAll(".cl-item");
  const done = groupEl.querySelectorAll(".cl-item.checked").length;
  const total = items.length;
  groupEl.querySelector(".cl-progress").textContent = done + "/" + total;
  const allDone = done === total;
  groupEl.classList.toggle("done", allDone);
}

function renderBlock(b, gi) {
  switch(b.t) {
    case "sec": return `<div class="sec-heading">${b.text}</div>`;
    case "cave": return `<div class="cave"><strong>⚠ CAVE: </strong>${b.text}</div>`;
    case "highlight": return `<div class="highlight">${b.title ? `<strong>${b.title}</strong>` : ""}${b.text}</div>`;
    case "info": return `<div class="infobox">${b.title ? `<div class="infobox-title">${b.title}</div>` : ""}<ul>${b.items.map(i => `<li>${i}</li>`).join("")}</ul></div>`;
    case "list": return `<ul class="content-list">${b.items.map(i => `<li>${i}</li>`).join("")}</ul>`;
    case "cards": return `<div class="cards">${b.items.map(c => `<div class="card" style="border-top-color:${c.color}"><div class="c-icon">${c.icon}</div><div class="c-title" style="color:${c.color}">${c.title}</div><div class="c-text">${c.text}</div></div>`).join("")}</div>`;
    case "table": return `<div class="tbl-wrap"><table><thead><tr>${b.headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${b.rows.map(r => `<tr>${r.map((c,i) => `<td>${i===1 && b.headers[1]==="Durchwahl" ? `<span class='phone-badge'>${c}</span>` : c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
    case "phonetable": return `<div class="tbl-wrap"><table><thead><tr><th>Bereich</th><th>Durchwahl</th><th>Hinweis</th></tr></thead><tbody>${b.rows.map((r,i) => `<tr><td>${r[0]}</td><td><span class="phone-badge">${r[1]}</span></td><td style="color:#6B7280;font-style:italic">${r[2]}</td></tr>`).join("")}</tbody></table></div>`;
    case "cl_group": {
      const items = b.items.map((item, i) => {
        const key = `${b.id}_${i}`;
        const isDone = !!checked[key];
        return `<div class="cl-item ${isDone ? "checked" : ""}" data-key="${key}">
          <div class="cl-box">${isDone ? "✓" : ""}</div>
          <span class="cl-label">${item}</span>
        </div>`;
      }).join("");
      const done = b.items.filter((_, i) => checked[`${b.id}_${i}`]).length;
      const allDone = done === b.items.length;
      return `<div class="cl-group ${allDone ? "done" : ""}">
        <div class="cl-group-header">
          <span class="cl-group-title">${b.title}</span>
          <span class="cl-progress">${done}/${b.items.length}</span>
        </div>
        <div class="cl-items">${items}</div>
      </div>`;
    }
    case "sign": return `<div class="sign-block">
      <div><div class="sign-role">Mitarbeiterin / Mitarbeiter</div><div class="sign-line"></div><div class="sign-hint">Unterschrift / Datum</div></div>
      <div><div class="sign-role">Praxisanleitung</div><div class="sign-line"></div><div class="sign-hint">Unterschrift / Datum</div></div>
    </div>`;
    default: return "";
  }
}

function navigate(id) {
  active = id;
  closeDrawer();
  renderContent();
  window.scrollTo({top: 0, behavior: "smooth"});
}

function toggleDrawer() {
  document.getElementById("drawer").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

// Init
renderContent();
</script>
